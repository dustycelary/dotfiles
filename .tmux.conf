# --- [BOTH] ---
# Prefix Key
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Terminal and Color Settings
set-option -sa terminal-features ',xterm-ghostty:RGB'
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-overrides ",*:Ms=\\E]52;c;%p2%s\\007"
set -as terminal-features ",*:cstyle"
set -g mode-style "bg=#13c2c2,fg=black"
set -as terminal-features ',*:clipboard'
set -as terminal-features ',xterm-ghostty:clipboard'
set -as terminal-features ',xterm-256color:clipboard'


# General Settings
set -g renumber-windows on
set -sg escape-time 10
set -g history-limit 50000
set -g focus-events on
set-window-option -g display-panes-time 1500
set-window-option -g mode-keys vi
set-option -g repeat-time 1000
set-option -g assume-paste-time 0

# Vi Mode and Copy Mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -n C-s copy-mode

if-shell 'uname | grep -q Darwin' {
  # --- [MAC ONLY] ---
  bind-key -T copy-mode-vi "{" send-keys -X search-backward "\\$ "
  bind-key -T copy-mode-vi "}" send-keys -X search-forward "\\$ "

  # Automatically grab output of last command
  bind-key Y copy-mode \; \
    send-keys -X start-of-line \; \
    send-keys -X begin-selection \; \
    send-keys -X search-backward "\\$ " \; \
    send-keys -X start-of-line \; \
    send-keys -X copy-pipe-and-cancel "pbcopy"

  bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
  unbind -T copy-mode-vi Enter
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  # --- [PI/LINUX ONLY] ---
  bind-key -T copy-mode-vi "{" send-keys -X search-backward "\\$ "
  bind-key -T copy-mode-vi "}" send-keys -X search-forward "\\$ "

  bind-key Y copy-mode \; \
    send-keys -X start-of-line \; \
    send-keys -X begin-selection \; \
    send-keys -X search-backward "\\$ " \; \
    send-keys -X start-of-line \; \
    send-keys -X copy-selection-and-cancel \; \
    run-shell 'if grep -aq SSH_CONNECTION /proc/#{client_pid}/environ 2>/dev/null; then printf "\033]52;c;$(tmux save-buffer - | base64 | tr -d "\n")\a" > #{client_tty}; else tmux save-buffer - | (xclip -in -selection clipboard || xsel -i --clipboard || wl-copy 2>/dev/null); fi'

  bind-key -T copy-mode-vi y send-keys -X copy-selection \; run-shell 'if grep -aq SSH_CONNECTION /proc/#{client_pid}/environ 2>/dev/null; then printf "\033]52;c;$(tmux save-buffer - | base64 | tr -d "\n")\a" > #{client_tty}; else tmux save-buffer - | (xclip -in -selection clipboard || xsel -i --clipboard || wl-copy 2>/dev/null); fi'
  unbind -T copy-mode-vi Enter
  bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel \; run-shell 'if grep -aq SSH_CONNECTION /proc/#{client_pid}/environ 2>/dev/null; then printf "\033]52;c;$(tmux save-buffer - | base64 | tr -d "\n")\a" > #{client_tty}; else tmux save-buffer - | (xclip -in -selection clipboard || xsel -i --clipboard || wl-copy 2>/dev/null); fi'
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel \; run-shell 'if grep -aq SSH_CONNECTION /proc/#{client_pid}/environ 2>/dev/null; then printf "\033]52;c;$(tmux save-buffer - | base64 | tr -d "\n")\a" > #{client_tty}; else tmux save-buffer - | (xclip -in -selection clipboard || xsel -i --clipboard || wl-copy 2>/dev/null); fi'
}

# --- [BOTH] ---
set -s set-clipboard on
set -g allow-passthrough on

bind-key [ copy-mode
bind-key ] paste-buffer

# Mouse Support
set -g mouse on

# Pane Management
bind-key x kill-pane
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key H command-prompt -p "Join pane from window:"  "join-pane -h -s '%%'"
bind-key V command-prompt -p "Join pane from window:"  "join-pane -v -s '%%'"
bind-key J choose-tree -Zw "join-pane -h -s '%%'"

# Pane Navigation (Vim-style & Alt-keys)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Alt-number window jumping
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6

# Pane Resizing
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

bind-key a last-pane
bind-key q display-panes
bind -n M-x kill-pane
bind-key C-o rotate-window
bind-key @ break-pane -d

# Window Management
bind-key c new-window
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1
bind-key enter next-layout
bind-key + select-layout even-horizontal
bind-key = select-layout even-vertical
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

# Session Management
bind S choose-session
bind N new-session

# Pane Synchronization
bind e setw synchronize-panes

# Utility Bindings
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
bind-key r refresh-client
bind-key L clear-history
bind-key : command-prompt

# Scratchpad (Toggleable bottom pane)
bind-key g split-window -v -p 30 -f

# Nested Tmux (Passthrough Mode)
bind -n F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Status Bar
set-option -g status-interval 2
set-option -g status-position bottom
set-option -g status-left " #S   "
set-option -g status-left-length 30
set-option -g status-right "#{?#{==:#{client_key_table},off}, [PASS] ,#{?client_prefix, [PREFIX] ,#{?pane_in_mode, [COPY] ,}}} #(~/.tmux/scripts/agy_monitor.sh) | %H:%M  %d %b"
set-option -g status-right-length 60
setw -g window-status-format        " #I #W "
setw -g window-status-current-style ""
setw -g window-status-current-format " #I #W* "
setw -g window-status-separator ""

# Local Overrides (source if exists)
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
