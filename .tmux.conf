# ==============================================================================
# WINDOW MANAGEMENT
# ==============================================================================
# Windows are like tabs in a browser. Each window contains one or more panes.
#
# CREATING WINDOWS:
#   prefix + c  -> Create new window
#
# NAVIGATING WINDOWS:
#   prefix + 1-9    -> Go to window by number
#   prefix + space  -> Next window
#   prefix + bspace -> Previous window (backspace)
#   prefix + t      -> Next window
#   prefix + T      -> Previous window
#
# SWAPPING WINDOWS:
#   prefix + <  -> Move window left (swap with previous)
#   prefix + >  -> Move window right (swap with next)
#
#   These are repeatable: after prefix + <, keep pressing < to continue moving.
#
# LAYOUTS:
#   prefix + enter  -> Cycle to next layout
#   prefix + +      -> Main-horizontal layout (one large pane on top)
#   prefix + =      -> Main-vertical layout (one large pane on left)
#
# LAYOUT DESCRIPTIONS:
#   even-horizontal: Panes spread evenly left to right
#   even-vertical:   Panes spread evenly top to bottom
#   main-horizontal: One large pane on top, others below
#   main-vertical:   One large pane on left, others on right
#   tiled:           Panes in grid pattern
# ==============================================================================

# New window
bind-key c new-window

# Window navigation
# bind-key space next-window
# bind-key bspace previous-window
# bind-key t next-window
# bind-key T previous-window

# Swap/move windows left and right (repeatable)
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Layout switching
bind-key enter next-layout
bind-key + select-layout even-horizontal
bind-key = select-layout even-vertical

# Size of the main pane in main-horizontal/main-vertical layouts
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80


# ==============================================================================
# SESSION MANAGEMENT
# ==============================================================================
# Sessions are independent workspaces. You might have one session for each
# project you're working on.
#
# CREATING SESSIONS:
#   prefix + N  -> Create new session (prompts for name)
#   tmux new -s myproject  (from shell)
#
# SWITCHING SESSIONS:
#   prefix + S  -> Interactive session chooser
#                  Use j/k to navigate, Enter to select, x to kill
#   prefix + (  -> Previous session
#   prefix + )  -> Next session
#
# DETACHING:
#   prefix + d  -> Detach from current session (session keeps running)
#   tmux attach -t myproject  (reattach from shell)
#
# LISTING SESSIONS:
#   tmux ls  (from shell)
# ==============================================================================

# Interactive session chooser
bind S choose-session

# Create new session
bind N new-session


# ==============================================================================
# PANE SYNCHRONIZATION
# ==============================================================================
# Synchronization sends your keystrokes to ALL panes in the current window
# simultaneously. This is incredibly useful for:
# - Running the same command on multiple servers
# - Editing the same file in multiple places
# - Comparing output across different environments
#
# USAGE:
#   prefix + e  -> Toggle synchronization on/off
#
# VISUAL INDICATOR:
# When sync is enabled, all panes will show the same cursor position and
# receive the same input. The status bar shows the sync state.
#
# WARNING: Be careful with destructive commands when sync is enabled!
# ==============================================================================
bind e setw synchronize-panes


# ==============================================================================
# UTILITY BINDINGS
# ==============================================================================
# Various utility commands for managing tmux.
#
# CONFIG RELOAD:
#   prefix + R  -> Reload tmux config and show confirmation message
#                  Use this after editing .tmux.conf
#
# REFRESH:
#   prefix + r  -> Refresh the current client (redraw screen)
#                  Useful if display gets corrupted
#
# CLEAR HISTORY:
#   prefix + L  -> Clear the scrollback buffer for current pane
#                  Useful to free memory or clear sensitive output
#
# COMMAND PROMPT:
#   prefix + :  -> Open tmux command prompt
#                  Type any tmux command here (e.g., "kill-session")
# ==============================================================================

# Reload config with confirmation message
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Refresh client
bind-key r refresh-client

# Clear pane history
bind-key L clear-history

# Command prompt
bind-key : command-prompt


