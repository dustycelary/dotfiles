# ==============================================================================
# TMUX CONFIGURATION
# ==============================================================================
# This configuration provides a vim-centric, productive tmux setup optimized
# for macOS. It includes extensive customizations for navigation, copy-mode,
# session management, and visual feedback.
#
# TERMINOLOGY:
# - Prefix: The key combination that activates tmux commands (C-a in this config)
# - Pane: A subdivision of a window (like vim splits)
# - Window: A full-screen container for panes (like browser tabs)
# - Session: A collection of windows (like a workspace)
#
# TO RELOAD THIS CONFIG:
#   Press: prefix + R
#   Or run: tmux source-file ~/.tmux.conf
# ==============================================================================


# ==============================================================================
# PREFIX KEY
# ==============================================================================
# The prefix key is the "leader" key that tells tmux you're about to issue a
# command. The default is C-b (Ctrl+b), but C-a is more ergonomic since 'a' is
# on the home row.
#
# USAGE:
#   1. Press Ctrl+a (and release)
#   2. Then press the command key (e.g., 'c' for new window)
#
# To send a literal C-a to the underlying program (e.g., go to beginning of
# line in bash), press C-a twice (C-a C-a).
# ==============================================================================
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Copy mode selection highlight (gruvbox light)
# set -g mode-style "fg=#e2e2e3,bg=#4a484b"

# Copy mode selection highlight (bamboo.nvim — matches Visual group: bg=bg3, fg=fg)
# set -g mode-style "fg=#f1e9d2,bg=#3a3d37"

set-option -sa terminal-features ',xterm-ghostty:RGB'
# Set the default terminal mode to 256color mode
set -g default-terminal "tmux-256color"

# Tell tmux that outside terminal supports true color
set -ag terminal-overrides ",xterm-256color:RGB"

set -g mode-style "bg=#13c2c2,fg=black"
# If Ghostty's $TERM is set to something specific like xterm-ghostty, add this too:
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-features ",*:cstyle"
# run-shell 'tmux set -g cursor-colour "#$(sed -n "s/^cursor-color *= *//p" ~/.config/ghostty/config | tr -d " ")"'
# set -g mode-style reverse


# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================

# BASE INDEX
# ----------
# By default, windows and panes are numbered starting from 0. Setting base-index
# to 1 makes the numbering start from 1, which is more intuitive since keyboard
# number keys start with 1 on the left.
#
# USAGE:
#   prefix + 1  -> Go to window 1 (first window)
#   prefix + 2  -> Go to window 2 (second window)
# set -g base-index 1
# set -g pane-base-index 1

# RENUMBER WINDOWS
# ----------------
# When you close a window, this setting automatically renumbers the remaining
# windows to fill the gap. Without this, closing window 2 of [1,2,3] would
# leave you with [1,3], which is confusing.
#
# EXAMPLE:
#   Before closing window 2: [1] [2] [3]
#   After closing window 2:  [1] [2]  (window 3 becomes window 2)
set -g renumber-windows on
# ESCAPE TIME
# -----------
# This is the time tmux waits after receiving an escape character to determine
# if it's part of a function or meta key sequence. The default (500ms) causes
# noticeable delay when pressing Escape in vim. Setting it to 10ms makes vim
# mode switching feel instant.
#
# If you experience issues with escape sequences in certain programs, increase
# this value slightly (e.g., 50).
set -sg escape-time 10

# HISTORY LIMIT
# -------------
# The number of lines of history to keep in each pane's scrollback buffer.
# Default is 2000. Setting to 50000 lets you scroll back much further to see
# old output, which is invaluable for debugging or reviewing long logs.
#
# USAGE:
#   prefix + [  -> Enter copy mode to scroll up
#   q           -> Exit copy mode
#
# WARNING: Higher values use more memory per pane.
set -g history-limit 50000

# FOCUS EVENTS
# ------------
# Enables focus events to be passed through to applications running inside tmux.
# This is essential for vim's 'autoread' feature, which automatically reloads
# files when they change on disk. Without this, vim won't detect when you
# switch back to tmux from another application.
#
# Requires vim setting: set autoread
set -g focus-events on

# DISPLAY PANES TIME
# ------------------
# How long (in milliseconds) the pane numbers are displayed when you press
# prefix + q. Default is 1000ms. Setting to 1500ms gives you more time to
# read and press the pane number.
#
# USAGE:
#   prefix + q  -> Show pane numbers
#   0-9         -> Select that pane (while numbers are displayed)
set-window-option -g display-panes-time 1500

set-window-option -g mode-keys vi
# REPEAT TIME
# -----------
# Time (in milliseconds) to wait for a repeated key press. Setting to 0
# disables repeat, meaning you can immediately use arrow keys after switching
# windows without them being interpreted as window-switching commands.
#
# With repeat enabled (default 500ms): After prefix + arrow, arrow keys
# continue to switch windows for 500ms.
# With repeat disabled: Arrow keys immediately work for cursor movement.
set-option -g repeat-time 1000

# ASSUME PASTE TIME
# -----------------
# Disables the feature where tmux assumes rapid key sequences are pastes.
# This is needed for iTerm2's "Send Hex Codes" feature to work properly.
# Set to 0 to disable this behavior entirely.
set-option -g assume-paste-time 0


# ==============================================================================
# TERMINAL AND COLOR SETTINGS
# ==============================================================================
# These settings enable true color (24-bit RGB) support in tmux. This is
# essential for modern colorschemes in vim/neovim to display correctly.
#
# TROUBLESHOOTING:
# If colors look wrong, ensure your terminal emulator supports true color.
# Test with: printf "\x1b[38;2;255;100;0mTRUECOLOR\x1b[0m\n"
# (Should display "TRUECOLOR" in orange)
#
# For iTerm2: Preferences > Profiles > Terminal > Report Terminal Type: xterm-256color
# ==============================================================================
# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"


# ==============================================================================
# VI MODE AND COPY MODE
# ==============================================================================
# These settings enable vim-style keybindings in copy mode, making it feel
# natural for vim users to navigate and select text.
#
# ENTERING COPY MODE:
#   prefix + [     -> Enter copy mode
#   Mouse scroll   -> Automatically enters copy mode
#
# NAVIGATION IN COPY MODE (vim-style):
#   h/j/k/l        -> Move cursor left/down/up/right
#   w/b            -> Move word forward/backward
#   0/$            -> Go to beginning/end of line
#   g/G            -> Go to top/bottom of buffer
#   /              -> Search forward
#   ?              -> Search backward
#   n/N            -> Next/previous search result
#
# SELECTION AND COPYING:
#   v              -> Start selection (like vim visual mode)
#   y              -> Copy selection to system clipboard
#   Enter          -> Copy selection to system clipboard
#   Escape         -> Clear selection
#   q              -> Exit copy mode
#
# PASTING:
#   prefix + ]     -> Paste from tmux buffer
#   Cmd + v        -> Paste from system clipboard (in terminal)
# ==============================================================================
setw -g mode-keys vi

# Start selection with 'v' (like vim visual mode)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -n C-s copy-mode

if-shell 'uname | grep -q Darwin' {
  # Navigating between prompts using the unique prompt marker '§'
  bind-key -T copy-mode-vi "{" send-keys -X search-backward "§"
  bind-key -T copy-mode-vi "}" send-keys -X search-forward "§"

  # Automatically grab the entire output of the last command
  bind-key Y copy-mode \; \
    send-keys -X search-backward "§ " \; \
    send-keys -X search-backward "§ " \; \
    send-keys -X start-of-line \; \
    send-keys -X begin-selection \; \
    send-keys -X search-forward "§" \; \
    send-keys -X cursor-up \; \
    send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  # Jump between shell prompts (adjust the pattern to match your prompt)
  # bind -T copy-mode-vi { search-backward "❯\\|❮\\|\\$\\|fungus"
  # bind -T copy-mode-vi { search-backward "* >"
  # bind -T copy-mode-vi } search-forward "* >"
  # bind -T copy-mode-vi } search-forward "❯\\|❮\\|\\$\\|fungus"
  # bind-key -T copy-mode-vi "{" send-keys -X search-backward "  >"
  # bind-key -T copy-mode-vi "}" send-keys -X search-forward "  >"
  bind-key -T copy-mode-vi "{" send-keys -X search-backward "\\$"
  bind-key -T copy-mode-vi "}" send-keys -X search-forward "\\$"

  # bind-key -T copy-mode-vi "{" send-keys -X search-backward " ~ ."
  # bind-key -T copy-mode-vi "}" send-keys -X search-forward  " ~ ."
}


# Copy with 'y' to system clipboard (macOS)
# Note: On modern macOS/tmux, 'reattach-to-user-namespace' is no longer needed.
# 'pbcopy' is the macOS command that copies to the system clipboard.
#
# TWO COPY OPTIONS:
#   y     -> Copy selection to clipboard and STAY in copy mode (copy-pipe)
#   Enter -> Copy selection to clipboard and EXIT copy mode (copy-pipe-and-cancel)
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"

unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Standard copy mode bindings
bind-key [ copy-mode
bind-key ] paste-buffer


# ==============================================================================
# MOUSE SUPPORT
# ==============================================================================
# Enables full mouse support in tmux:
# - Click to select pane
# - Drag to resize pane borders
# - Scroll wheel to scroll in copy mode
# - Click and drag to select text
# - Right-click for context menu (in some terminals)
#
# SCROLL WHEEL BEHAVIOR:
# The WheelUpPane/WheelDownPane bindings below provide smart scrolling:
# - In normal mode: Enters copy mode and scrolls
# - In alternate screen apps (vim, less, man): Sends scroll to the app
#
# To disable mouse temporarily (e.g., to use terminal's native selection):
#   Hold Shift while clicking/dragging (in most terminals)
#   Or: prefix + : set -g mouse off
# ==============================================================================
set -g mouse on

# Smart scrolling - enters copy mode when scrolling, but passes through to
# applications that use the alternate screen (vim, less, etc.)
# bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
# bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"


# ==============================================================================
# PANE MANAGEMENT
# ==============================================================================
# Panes are subdivisions of a window. These bindings provide vim-style
# navigation and manipulation of panes.
#
# CREATING PANES (SPLITS):
#   prefix + v  -> Split vertically (new pane to the right)
#   prefix + s  -> Split horizontally (new pane below)
#
#   Note: New panes open in the same directory as the current pane thanks to
#   the -c "#{pane_current_path}" option.
#
# NAVIGATING PANES:
#   prefix + h  -> Move to pane on the left
#   prefix + j  -> Move to pane below
#   prefix + k  -> Move to pane above
#   prefix + l  -> Move to pane on the right
#   prefix + a  -> Toggle to last active pane
#
# RESIZING PANES:
#   prefix + H  -> Resize pane left by 5 cells
#   prefix + J  -> Resize pane down by 5 cells
#   prefix + K  -> Resize pane up by 5 cells
#   prefix + L  -> Resize pane right by 5 cells
#
#   The -r flag makes these repeatable: after pressing prefix + H once,
#   you can keep pressing H to continue resizing without the prefix.
#
# OTHER PANE OPERATIONS:
#   prefix + x      -> Kill current pane (no confirmation)
#   prefix + q      -> Show pane numbers (press number to switch)
#   prefix + C-o    -> Rotate panes in current window
#   prefix + @      -> Break current pane to a new window (stay here)
#   prefix + space  -> Cycle through pane layouts
# ==============================================================================

# Kill pane without confirmation (default asks "kill-pane #P? (y/n)")
bind-key x kill-pane

# Vim-style pane splits (preserving current path)
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Option/Alt + hjkl pane navigation (no prefix required)
# Requires terminal to send Esc+ for Option key (iTerm2: Profiles > Keys > Left Option = Esc+)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Option/Alt + [ / ] window navigation (no prefix required)
bind -n M-\{ previous-window
bind -n M-\} next-window

# Vim-style pane resizing (repeatable with -r flag)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Quick toggle to last pane
bind-key a last-pane

# Display pane numbers
bind-key q display-panes

# Kill current pane (no prefix required)
bind -n M-x kill-pane

# Rotate panes
bind-key C-o rotate-window

# Break pane like prefix + !, but keep focus on the current window
bind-key @ break-pane -d

# SMART PANE SWITCHING WITH VIM AWARENESS (OPTIONAL)
# --------------------------------------------------
# Uncomment the following to enable seamless navigation between tmux panes
# and vim splits using the same C-h/j/k/l keys. This requires the
# 'vim-tmux-navigator' plugin in vim.
#
# How it works: These bindings check if the current pane is running vim.
# If so, they send the keystrokes to vim. Otherwise, they switch tmux panes.
#
# Installation:
# 1. Install vim-tmux-navigator in vim (via your plugin manager)
# 2. Uncomment the lines below
# 3. Reload tmux config
