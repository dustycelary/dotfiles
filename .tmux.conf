# ==============================================================================
# NESTED TMUX (PASSTHROUGH MODE)
# ==============================================================================
# When you SSH into a machine that also runs tmux, the outer (local) tmux
# intercepts all keypresses — the inner (remote) tmux never sees prefix
# commands or root-table bindings like C-s.
#
# Passthrough mode suspends the outer tmux entirely so all keys reach the
# inner session.
#
# USAGE:
#   F12   -> Enable passthrough  (outer tmux steps aside; status bar dims)
#   F12   -> Disable passthrough (outer tmux resumes control)
#
# WORKFLOW:
#   1. In your local tmux, SSH into the remote machine
#   2. Start or attach tmux on the remote machine
#   3. Press F12 — the outer tmux disables itself ([PASS] appears in status)
#   4. All keypresses now go directly to the inner tmux
#   5. Press F12 again to hand control back to the outer tmux
# ==============================================================================

# Enable passthrough: disable prefix and switch to the empty 'off' key table
bind -n F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

# Disable passthrough: restore prefix and key table (F12 is the only key in 'off')
bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S


# ==============================================================================
# STATUS BAR
# ==============================================================================


# Update interval (in seconds)
set-option -g status-interval 10

set-option -g status-position bottom

# Left: session name
set-option -g status-left " #S   "
set-option -g status-left-length 30

# Right: prefix/copy mode alert + time + date
# Right: prefix/copy mode alert + agy monitor + time + date
set-option -g status-right "#{?#{==:#{client_key_table},off}, [PASS] ,#{?client_prefix, [PREFIX] ,#{?pane_in_mode, [COPY] ,}}} #(~/.tmux/scripts/agy_monitor.sh) | %H:%M  %d %b"
set-option -g status-right-length 60

# Window list — inactive
setw -g window-status-format        " #I #W "
setw -g window-status-current-style ""

# Window list — active window (asterisk indicator)
setw -g window-status-current-format " #I #W* "

# Separator between windows in the list
setw -g window-status-separator ""

# set -g status-right "#(~/.tmux/scripts/agy_monitor.sh) | %H:%M %d-%b-%y"

# Optional: Tell tmux to update the status bar every 2 seconds (default is 15)
set -g status-interval 2

# ==============================================================================
# ACTIVITY MONITORING
# ==============================================================================
# These settings help you notice when something happens in a background window.
#
# MONITOR-ACTIVITY:
# When enabled, windows with activity (new output) are highlighted in the
# status bar. The window name will change color to indicate activity.
#
# VISUAL-ACTIVITY:
# When enabled, tmux displays a message "Activity in window N" when a
# background window has output.
#
# This is useful for:
# - Long-running commands (builds, tests, downloads)
# - Monitoring logs in a background window
# - Chat/notification windows
# ==============================================================================
# setw -g monitor-activity off
# set -g visual-activity off


# ==============================================================================
# PLUGIN MANAGER (TPM) - OPTIONAL
# ==============================================================================
# TPM (Tmux Plugin Manager) allows you to easily install and manage tmux plugins.
#
# INSTALLATION:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   Then reload tmux config: prefix + R
#
# USAGE:
#   prefix + I        -> Install plugins listed below
#   prefix + U        -> Update plugins
#   prefix + alt + u  -> Remove plugins not in the list
#
# INCLUDED PLUGINS:
#   tmux-sensible:   Sensible defaults everyone can agree on
#   tmux-resurrect:  Save and restore tmux sessions across system restarts
#                    prefix + Ctrl-s  -> Save session
#                    prefix + Ctrl-r  -> Restore session
#
# To add more plugins, add lines like:
#   set -g @plugin 'github-username/plugin-name'
#
# Popular plugins:
#   tmux-yank:       Enhanced copy-paste
#   tmux-continuum:  Automatic session saving (works with resurrect)
#   tmux-cpu:        Show CPU/memory in status bar
#   dracula/tmux:    Beautiful theme
# ==============================================================================

# Uncomment the following lines to enable TPM:
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# run '~/.tmux/plugins/tpm/tpm'


# ==============================================================================
# LOCAL OVERRIDES
# ==============================================================================
# If you have machine-specific settings, put them in ~/.tmux.conf.local
# This keeps your main config portable while allowing local customization.
#
# Example ~/.tmux.conf.local:
#   set -g status-style bg=blue  # Different color on work machine
# ==============================================================================

# Source local config if it exists
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"


# ==============================================================================
# QUICK REFERENCE
# ==============================================================================
# PANES:
#   prefix + v      Split vertical     prefix + h/j/k/l  Navigate panes
#   prefix + s      Split horizontal   prefix + H/J/K/L  Resize panes
#   prefix + x      Kill pane          prefix + a        Last pane
#   prefix + q      Show pane numbers  prefix + @        Break pane (stay)
#   prefix + e      Sync panes toggle
#
# WINDOWS:
#   prefix + c      New window         prefix + 1-9      Go to window N
#   prefix + space  Next window        prefix + bspace   Previous window
#   prefix + </>    Move window        prefix + +/=      Layouts
#
# SESSIONS:
#   prefix + N      New session        prefix + S        Choose session
#   prefix + d      Detach             prefix + $        Rename session
#
# COPY MODE:
#   prefix + [      Enter copy mode    v                 Start selection
#   y               Copy + stay        Enter             Copy + exit mode
#   q               Exit copy mode     /                 Search forward
#
# MISC:
#   prefix + R      Reload config      prefix + :        Command prompt
#   prefix + ?      List all bindings  prefix + r        Refresh client
# ==============================================================================
